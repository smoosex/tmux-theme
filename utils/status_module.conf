# vim:set ft=tmux:

# Embedded style that ensures that modules look "connected"
# when required.
set -gqF @_theme_connect_style \
  "#{?#{==:#{@theme_status_connect_separator},yes},,#[bg=default]}"

# There are four colors involved:
#
# - Icon
#   - fg: @theme_status_[module]_icon_fg [default = crust]
#   - bg: @theme_status_[module]_icon_bg [required]
# - Text
#   - fg: @theme_status_[module]_text_fg [default = foreground]
#   - bg: @theme_status_[module]_text_bg [default = @theme_status_module_text_bg]

set -ogqF "@theme_status_${MODULE_NAME}_icon_fg" "#{E:@thm_crust}"
set -ogqF "@theme_status_${MODULE_NAME}_text_fg" "#{E:@thm_fg}"

%if "#{==:#{@theme_status_${MODULE_NAME}_icon_bg},}"
  set -gqF "@theme_status_${MODULE_NAME}_icon_bg" "#{@theme_${MODULE_NAME}_color}"
%endif

%if "#{==:#{@theme_status_${MODULE_NAME}_text_bg},}"
  set -gqF @_theme_module_text_bg "#{E:@theme_status_module_text_bg}"
%else
  set -gqF @_theme_module_text_bg "#{@theme_status_${MODULE_NAME}_text_bg}"
%endif

set -gF "@theme_status_${MODULE_NAME}" \
  "#[fg=#{@theme_status_${MODULE_NAME}_icon_bg}]#{@_theme_connect_style}#{@theme_status_left_separator}"

set -agF "@theme_status_${MODULE_NAME}" \
  "#[fg=#{@theme_status_${MODULE_NAME}_icon_fg},bg=#{@theme_status_${MODULE_NAME}_icon_bg}]#{@theme_${MODULE_NAME}_icon}"

set -agF "@theme_status_${MODULE_NAME}" \
  "#{@theme_status_middle_separator}"

set -agF "@theme_status_${MODULE_NAME}" \
  "#[fg=#{@theme_status_${MODULE_NAME}_text_fg},bg=#{@_theme_module_text_bg}]"

set -ag "@theme_status_${MODULE_NAME}" "#{E:@theme_${MODULE_NAME}_text}"

set -agF "@theme_status_${MODULE_NAME}" "#[fg=#{@_theme_module_text_bg}]#{@_theme_connect_style}#{@theme_status_right_separator}"

set -ug @_theme_connect_style
set -ug @_theme_module_text_bg
