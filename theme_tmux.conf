%if "#{==:#{@theme_status_background},default}"
  set -gF @_theme_status_bg "#{@thm_mantle}"
  set -gF status-style "bg=#{@_theme_status_bg},fg=#{@thm_fg}"

  %hidden THEME_MESSAGE_BACKGROUND="#{@thm_overlay_0}"
%elif "#{==:#{@theme_status_background},none}"
  set -g status-style "default"
  set -g @_theme_status_bg "none"

  %hidden THEME_MESSAGE_BACKGROUND="default"
%else
  set -gF status-style "bg=#{E:@theme_status_background},fg=#{@thm_fg}"
  set -gF @_theme_status_bg "#{E:@theme_status_background}"

  %hidden THEME_MESSAGE_BACKGROUND="#{E:@theme_status_background}"
%endif

source -F "#{d:current_file}/status/application.conf"
source -F "#{d:current_file}/status/battery.conf"
source -F "#{d:current_file}/status/clima.conf"
source -F "#{d:current_file}/status/cpu.conf"
source -F "#{d:current_file}/status/date_time.conf"
source -F "#{d:current_file}/status/directory.conf"
source -F "#{d:current_file}/status/gitmux.conf"
source -F "#{d:current_file}/status/host.conf"
source -F "#{d:current_file}/status/kube.conf"
source -F "#{d:current_file}/status/load.conf"
source -F "#{d:current_file}/status/pomodoro_plus.conf"
source -F "#{d:current_file}/status/session.conf"
source -F "#{d:current_file}/status/uptime.conf"
source -F "#{d:current_file}/status/user.conf"
source -F "#{d:current_file}/status/weather.conf"

set -gF message-style "fg=#{@thm_teal},bg=$THEME_MESSAGE_BACKGROUND,align=centre"
set -gF message-command-style "fg=#{@thm_teal},bg=$THEME_MESSAGE_BACKGROUND,align=centre"

%if "#{>=:#{version},3.4}"
  set -gF menu-selected-style "#{E:@theme_menu_selected_style}"
%endif

set -wgF pane-active-border-style "#{E:@theme_pane_active_border_style}"
set -wgF pane-border-style "#{E:@theme_pane_border_style}"

%if "#{==:#{@theme_pane_status_enabled},yes}"
  set -gq @_theme_p_left ""
  set -gq @_theme_p_middle ""
  set -gq @_theme_p_right ""
  set -gq @_theme_p_number ""
  set -gq @_theme_p_text ""

  %if "#{==:#{@theme_pane_default_fill},none}"
    set -g @_theme_p_left \
      "#[fg=#{@thm_surface_0},bg=default]#{@theme_pane_left_separator}"
    set -g @_theme_p_middle \
      "#[fg=#{@thm_fg},bg=#{@thm_surface_0}]#{@theme_pane_middle_separator}"
    set -g @_theme_p_right \
      "#[fg=#{@thm_surface_0},bg=default]#{@theme_pane_right_separator}"

    set -g @_theme_p_number \
      "#[fg=#{@thm_fg},bg=#{@thm_surface_0}]##{pane_index}"
    set -g @_theme_p_text \
      "#[fg=#{@thm_fg},bg=#{@thm_surface_0}]#{E:@theme_pane_default_text}"

  %elif "#{==:#{@theme_pane_default_fill},all}"
    set -g @_theme_p_left \
      "#[fg=#{E:@theme_pane_color},bg=default]#{@theme_pane_left_separator}"
    set -g @_theme_p_middle \
      "#[fg=#{E:@theme_pane_color},bg=#{E:@theme_pane_background_color}]#{@theme_pane_middle_separator}"
    set -g @_theme_p_right \
      "#[fg=#{E:@theme_pane_color},bg=default]#{@theme_pane_right_separator}"

    set -g @_theme_p_number \
      "#[fg=#{E:@theme_pane_background_color},bg=#{E:@theme_pane_color}]##{pane_index}"
    set -g @_theme_p_text \
      "#[fg=#{E:@theme_pane_background_color},bg=#{E:@theme_pane_color}]#{E:@theme_pane_default_text}"

  %elif "#{==:#{@theme_pane_default_fill},number}"
    %if "#{==:#{@theme_pane_number_position},left}"
      set -g @_theme_p_left \
        "#[fg=#{E:@theme_pane_color},bg=default]#{@theme_pane_left_separator}"
      set -g @_theme_p_right \
        "#[fg=#{E:@theme_pane_background_color},bg=default]#{@theme_pane_right_separator}"
    %else
      set -g @_theme_p_left \
        "#[fg=#{E:@theme_pane_background_color},bg=default]#{@theme_pane_left_separator}"
      set -g @_theme_p_right \
        "#[fg=#{E:@theme_pane_color},bg=default]#{@theme_pane_right_separator}"
    %endif

    set -g @_theme_p_middle \
      "#[fg=#{E:@theme_pane_color},bg=#{E:@theme_pane_background_color}]#{@theme_pane_middle_separator}"

    set -g @_theme_p_number \
      "#[fg=#{E:@theme_pane_background_color},bg=#{E:@theme_pane_color}]##{pane_index}"
    set -g @_theme_p_text \
      "#[fg=#{E:@theme_pane_color},bg=#{E:@theme_pane_background_color}]#{E:@theme_pane_default_text}"
  %endif

  %if "#{==:#{@theme_pane_number_position},left}"
    set -wgF pane-border-format \
      "#{E:@_theme_p_left}#{E:@_theme_p_number}#{E:@_theme_p_middle} #{E:@_theme_p_text}#{E:@_theme_p_right}"
  %else
    set -wgF pane-border-format \
      "#{E:@_theme_p_left}#{E:@_theme_p_text} #{E:@_theme_p_middle}#{E:@_theme_p_number}#{E:@_theme_p_right}"
  %endif

  set -ug @_theme_p_left
  set -ug @_theme_p_middle
  set -ug @_theme_p_right
  set -ug @_theme_p_number
  set -ug @_theme_p_text
%endif

%if "#{>=:#{version},3.4}"
  set -gF popup-style "bg=#{@thm_bg},fg=#{@thm_fg}"
  set -gF popup-border-style "fg=#{@thm_surface_1}"
%endif

%if "#{==:#{@theme_window_status_style},basic}"
  set -gq @theme_window_left_separator " "
  set -gq @theme_window_middle_separator " "
  set -gq @theme_window_right_separator " "
%elif "#{==:#{@theme_window_status_style},rounded}"
  set -gq @theme_window_left_separator "#[fg=#{@_theme_status_bg},reverse]#[none]"
  set -gq @theme_window_middle_separator " "
  set -gq @theme_window_right_separator "#[fg=#{@_theme_status_bg},reverse]#[none]"
%elif "#{==:#{@theme_window_status_style},slanted}"
  set -gq @theme_window_left_separator "#[fg=#{@_theme_status_bg},reverse]#[none]"

  %if "#{==:#{@theme_window_number_position},left}"
    set -gq @theme_window_middle_separator "#[fg=#{@theme_window_number_color},bg=#{@theme_window_text_color}]"
    set -gq @theme_window_current_middle_separator \
      "#[fg=#{@theme_window_current_number_color},bg=#{@theme_window_current_text_color}]"
  %else
    set -gq @theme_window_middle_separator " #[fg=#{@theme_window_number_color},bg=#{@theme_window_text_color}]"
    set -gq @theme_window_current_middle_separator \
      " #[fg=#{@theme_window_current_number_color},bg=#{@theme_window_current_text_color}]"
  %endif

  set -gq @theme_window_right_separator "#[fg=#{@_theme_status_bg},reverse]█#[none]"
%endif

set -ogqF @theme_window_current_left_separator "#{@theme_window_left_separator}"
set -ogqF @theme_window_current_middle_separator "#{@theme_window_middle_separator}"
set -ogqF @theme_window_current_right_separator "#{@theme_window_right_separator}"

%if "#{!=:#{@theme_window_status_style},none}"
  set -gF window-status-activity-style "bg=#{@thm_lavender},fg=#{@thm_crust}"
  set -gF window-status-bell-style "bg=#{@thm_yellow},fg=#{@thm_crust}"

  %if "#{==:#{@theme_window_flags},icon}"
    set -gqF @_theme_w_flags "#{E:@theme_window_flags_icon_format}"
  %elif "#{==:#{@theme_window_flags},text}"
    set -gq @_theme_w_flags "#F"
  %else
    set -gq @_theme_w_flags ""
  %endif

  set -g @_theme_w_number_style "#[fg=#{@thm_crust},bg=#{@theme_window_number_color}]"
  set -g @_theme_w_text_style "#[fg=#{@thm_fg},bg=#{@theme_window_text_color}]"
  %if "#{==:#{@theme_window_number_position},left}"
    set -gF window-status-format \
      "#{E:@_theme_w_number_style}#{E:@theme_window_left_separator}#{@theme_window_number}"
    set -agF window-status-format "#{E:@theme_window_middle_separator}"
    set -agF window-status-format \
      "#{E:@_theme_w_text_style}#{@theme_window_text}#{@_theme_w_flags}#{E:@theme_window_right_separator}"
  %else
    set -gF window-status-format \
      "#{E:@_theme_w_text_style}#{E:@theme_window_left_separator}#{E:@_theme_w_text_style}#{@theme_window_text}#{@_theme_w_flags}"
    set -agF window-status-format "#{E:@theme_window_middle_separator}"
    set -agF window-status-format \
      "#{E:@_theme_w_number_style} #{@theme_window_number}#{E:@theme_window_right_separator}"
  %endif

  set -g @_theme_w_number_style "#[fg=#{@thm_crust},bg=#{@theme_window_current_number_color}]"
  set -g @_theme_w_text_style "#[fg=#{@thm_fg},bg=#{@theme_window_current_text_color}]"
  %if "#{==:#{@theme_window_number_position},left}"
    set -gF window-status-current-format \
      "#{E:@_theme_w_number_style}#{E:@theme_window_current_left_separator}#{@theme_window_current_number}"
    set -agF window-status-current-format "#{E:@theme_window_current_middle_separator}"
    set -agF window-status-current-format \
      "#{E:@_theme_w_text_style}#{@theme_window_current_text}#{@_theme_w_flags}#{E:@theme_window_current_right_separator}"
  %else
    set -gF window-status-current-format \
      "#{E:@_theme_w_text_style}#{E:@theme_window_current_left_separator}#{E:@_theme_w_text_style}#{@theme_window_current_text}#{@_theme_w_flags}"
    set -agF window-status-current-format "#{E:@theme_window_current_middle_separator}"
    set -agF window-status-current-format \
      "#{E:@_theme_w_number_style} #{@theme_window_current_number}#{E:@theme_window_current_right_separator}"
  %endif

  set -ug @_theme_w_number_style
  set -ug @_theme_w_text_style
  set -ug @_theme_w_flags
%endif

set -gF mode-style "bg=#{@thm_surface_0},bold"
set -gF clock-mode-colour "#{@thm_blue}"
